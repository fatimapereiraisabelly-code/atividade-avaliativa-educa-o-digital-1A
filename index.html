<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grêmio FBPA | Portal Oficial de Torcedor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <header role="banner">
        <nav aria-label="Menu Principal">
            <div class="logo">Grêmio FBPA</div>
            <div class="a11y-controls">
                <button id="btn-contrast" aria-label="Alternar Alto Contraste">🌓</button>
                <button id="btn-font-up" aria-label="Aumentar Fonte">A+</button>
                <button id="btn-font-down" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Nada Pode Ser Maior</h1>
            <p>Acompanhe as conquistas e a história do Imortal Tricolor.</p>
        </section>

        <section id="trophies-section" aria-labelledby="trophies-title">
            <h2 id="trophies-title">Nossas Conquistas</h2>
            <div class="grid-container" id="grid-trophies">
                </div>
        </section>

        <section class="carousel-container" aria-label="Carrossel de Notícias">
            <div class="carousel" id="news-carousel" role="region" aria-live="polite">
                </div>
            <div class="carousel-controls">
                <button id="prev" aria-label="Slide anterior">❮</button>
                <button id="next" aria-label="Próximo slide">❯</button>
            </div>
        </section>

        <section id="faq-section" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="accordion-container">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2024 Grêmio Foot-Ball Porto Alegrense. Desenvolvido com foco em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
